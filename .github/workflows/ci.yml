name: CI

on:
  push:
  pull_request:

jobs:
  guardrails:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fail on tracked local artifacts
        shell: bash
        run: |
          set -euo pipefail

          forbidden='(^|/)(.*\.db|.*\.sqlite|.*\.sqlite3|.*-journal|.*-wal|.*-shm|\.env(\..*)?|mcp_browser_clients\.local\.json)$'
          matches="$(git ls-files | grep -E "$forbidden" || true)"

          if [ -n "$matches" ]; then
            echo "Forbidden tracked files detected:"
            echo "$matches"
            exit 1
          fi

  test:
    needs: guardrails
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Check formatting
        run: ruff format --check .

      - name: Run linter
        run: ruff check .

      - name: Run tests
        run: pytest
